<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="20" y1="10" x2="180" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Hexagon (crucible shape) -->
  <path d="M100 8 L180 54 L180 146 L100 192 L20 146 L20 54 Z"
        fill="none" stroke="url(#hexGrad)" stroke-width="3"/>
  <path d="M100 8 L180 54 L180 146 L100 192 L20 146 L20 54 Z"
        fill="url(#hexGrad)" opacity="0.06"/>

  <!-- Three competing agent nodes -->
  <circle cx="100" cy="68" r="12" fill="#38bdf8"/>
  <circle cx="68"  cy="122" r="12" fill="#a78bfa"/>
  <circle cx="132" cy="122" r="12" fill="#34d399"/>

  <!-- Connections -->
  <line x1="100" y1="68" x2="68"  y2="122" stroke="#334155" stroke-width="2"/>
  <line x1="100" y1="68" x2="132" y2="122" stroke="#334155" stroke-width="2"/>
  <line x1="68"  y1="122" x2="132" y2="122" stroke="#334155" stroke-width="2"/>

  <!-- Score indicators (dots on nodes) -->
  <circle cx="100" cy="68"  r="4" fill="white" opacity="0.9"/>
  <circle cx="68"  cy="122" r="4" fill="white" opacity="0.7"/>
  <circle cx="132" cy="122" r="4" fill="white" opacity="0.8"/>
</svg>
